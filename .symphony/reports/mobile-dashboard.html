<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Symphony Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark;
  --page: #0a0a0c;
  --page-soft: #111115;
  --card: rgba(24, 24, 30, 0.95);
  --card-hover: rgba(30, 30, 38, 0.95);
  --ink: #e8e8ec;
  --ink-secondary: #b0b0be;
  --muted: #6e6e82;
  --line: #222230;
  --line-strong: #333340;
  --accent: #5e6ad2;
  --accent-soft: rgba(94, 106, 210, 0.12);
  --accent-ink: #8b93e6;
  --green: #4ade80;
  --green-soft: rgba(74, 222, 128, 0.10);
  --yellow: #fbbf24;
  --yellow-soft: rgba(251, 191, 36, 0.10);
  --red: #f87171;
  --red-soft: rgba(248, 113, 113, 0.10);
  --orange: #fb923c;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.4);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  background: var(--page);
  font-family: var(--font-sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
}
body {
  min-height: 100vh;
  min-height: 100dvh;
  padding-top: env(safe-area-inset-top);
  padding-bottom: calc(env(safe-area-inset-bottom) + 64px);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* ── App Shell ── */
#app { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }

/* Header */
.header {
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--line);
  background: rgba(10, 10, 12, 0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 50;
  padding-top: calc(env(safe-area-inset-top) + 12px);
}
.header-back {
  display: none; background: none; border: none; color: var(--accent-ink);
  font-size: 15px; font-weight: 500; cursor: pointer; padding: 4px 0;
}
.header-back.visible { display: block; }
.header-title { flex: 1; font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.header-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
  flex-shrink: 0;
}
.header-dot.connected { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.header-settings {
  background: none; border: none; color: var(--muted); font-size: 18px;
  cursor: pointer; padding: 4px;
}

/* ── Tab Bar (bottom) ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: rgba(10, 10, 12, 0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 50;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 6px; gap: 2px; background: none; border: none;
  color: var(--muted); font-size: 10px; font-weight: 500; cursor: pointer;
  transition: color 0.15s;
}
.tab-item.active { color: var(--accent-ink); }
.tab-icon { font-size: 20px; line-height: 1; }

/* ── Screens ── */
.screen { display: none; flex: 1; overflow-y: auto; }
.screen.active { display: block; }
.screen-content { padding: 16px; }

/* ── Status Bar ── */
.status-bar {
  display: flex; gap: 1px; padding: 16px 16px 8px; background: var(--page);
}
.status-item {
  flex: 1; text-align: center; padding: 12px 4px;
  background: var(--page-soft); border-radius: var(--radius-sm);
}
.status-item:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
.status-item:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.status-count {
  font-size: 22px; font-weight: 700; font-family: var(--font-mono);
  letter-spacing: -0.5px;
}
.status-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.status-item.running .status-count { color: var(--green); }
.status-item.retrying .status-count { color: var(--yellow); }
.status-item.completed .status-count { color: var(--accent-ink); }
.status-item.failed .status-count { color: var(--red); }

/* ── Issue Cards ── */
.section-title {
  font-size: 13px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 16px 0 8px;
}
.issue-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 8px;
  border: 1px solid var(--line); cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.issue-card:active { background: var(--card-hover); border-color: var(--line-strong); }
.issue-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.issue-id {
  font-family: var(--font-mono); font-size: 13px; font-weight: 500;
  color: var(--accent-ink);
}
.issue-stage {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 99px; text-transform: uppercase; letter-spacing: 0.3px;
}
.stage-investigate { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
.stage-implement { background: var(--green-soft); color: var(--green); }
.stage-review { background: rgba(251, 191, 36, 0.12); color: var(--yellow); }
.stage-merge { background: rgba(94, 106, 210, 0.12); color: var(--accent-ink); }
.health-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-left: auto;
}
.health-green { background: var(--green); }
.health-yellow { background: var(--yellow); }
.health-red { background: var(--red); animation: pulse 1.5s infinite; }
.issue-title {
  font-size: 14px; font-weight: 500; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.issue-meta {
  display: flex; gap: 12px; margin-top: 8px; font-size: 12px; color: var(--muted);
  font-family: var(--font-mono);
}
.issue-meta-item { display: flex; align-items: center; gap: 4px; }

/* ── Retry Cards ── */
.retry-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 8px;
  border: 1px solid rgba(251, 191, 36, 0.2);
}
.retry-header { display: flex; align-items: center; gap: 8px; }
.retry-id { font-family: var(--font-mono); font-size: 13px; color: var(--yellow); font-weight: 500; }
.retry-attempt { font-size: 11px; color: var(--muted); }
.retry-error {
  font-size: 12px; color: var(--red); margin-top: 6px;
  font-family: var(--font-mono); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.retry-due { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Totals Bar ── */
.totals-bar {
  display: flex; gap: 12px; padding: 12px 16px; margin: 8px 0;
  background: var(--page-soft); border-radius: var(--radius-sm);
  font-size: 12px; font-family: var(--font-mono); color: var(--muted);
  flex-wrap: wrap;
}
.totals-bar span { white-space: nowrap; }
.totals-bar .value { color: var(--ink-secondary); }

/* ── Issue Detail Screen ── */
.detail-header { padding: 16px; }
.detail-id {
  font-family: var(--font-mono); font-size: 15px; font-weight: 600;
  color: var(--accent-ink); margin-bottom: 4px;
}
.detail-title { font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; }
.detail-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.detail-badge {
  font-size: 12px; font-weight: 600; padding: 3px 10px;
  border-radius: 99px; text-transform: uppercase;
}

/* Stage Breakdown Bar */
.stage-bar-container { padding: 0 16px 16px; }
.stage-bar-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.stage-bar {
  display: flex; height: 8px; border-radius: 4px; overflow: hidden;
  background: var(--page-soft); gap: 2px;
}
.stage-bar-segment {
  border-radius: 4px; transition: flex 0.3s ease;
  min-width: 4px;
}
.stage-bar-segment.investigate { background: #818cf8; }
.stage-bar-segment.implement { background: var(--green); }
.stage-bar-segment.review { background: var(--yellow); }
.stage-bar-segment.merge { background: var(--accent-ink); }
.stage-bar-segment.current { animation: barPulse 2s infinite; }
@keyframes barPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.stage-bar-legend {
  display: flex; gap: 12px; margin-top: 6px; font-size: 11px; color: var(--muted);
  flex-wrap: wrap;
}
.legend-dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block;
  margin-right: 4px; vertical-align: middle;
}

/* Live Metrics Grid */
.metrics-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 0 16px 16px;
}
.metric-card {
  background: var(--page-soft); border-radius: var(--radius-sm);
  padding: 12px; border: 1px solid var(--line);
}
.metric-value {
  font-size: 20px; font-weight: 700; font-family: var(--font-mono);
  letter-spacing: -0.5px;
}
.metric-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Activity Feed */
.activity-section { padding: 0 16px 16px; }
.activity-item {
  display: flex; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.activity-item:last-child { border-bottom: none; }
.activity-time {
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
  white-space: nowrap; flex-shrink: 0; min-width: 56px;
}
.activity-text { color: var(--ink-secondary); line-height: 1.4; }
.activity-event-tag {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--accent-ink); font-weight: 500;
}

/* Deep Links */
.deep-links {
  display: flex; flex-direction: column; gap: 8px;
  padding: 0 16px 16px;
}
.deep-link {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: var(--radius);
  background: var(--page-soft); border: 1px solid var(--line);
  color: var(--ink); text-decoration: none; font-size: 14px; font-weight: 500;
  transition: background 0.15s;
}
.deep-link:active { background: var(--card-hover); }
.deep-link-icon { font-size: 18px; }
.deep-link-arrow { margin-left: auto; color: var(--muted); font-size: 16px; }

/* ── Reports Screen ── */
.report-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-bottom: 1px solid var(--line);
  text-decoration: none; color: var(--ink);
  transition: background 0.15s;
}
.report-item:active { background: var(--page-soft); }
.report-date { font-weight: 600; font-size: 15px; }
.report-size { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
.report-arrow { margin-left: auto; color: var(--muted); }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 48px 24px; color: var(--muted);
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.empty-state-text { font-size: 15px; }

/* ── Hold-to-confirm ── */
.hold-btn {
  position: relative; overflow: hidden;
  padding: 12px 24px; border-radius: var(--radius);
  background: var(--red-soft); border: 1px solid rgba(248, 113, 113, 0.3);
  color: var(--red); font-weight: 600; font-size: 14px;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  width: 100%;
}
.hold-btn .hold-fill {
  position: absolute; top: 0; left: 0; bottom: 0; width: 0;
  background: rgba(248, 113, 113, 0.15);
  transition: width 2s linear;
}
.hold-btn.holding .hold-fill { width: 100%; }
.hold-btn-text { position: relative; z-index: 1; }

/* ── Error Banner ── */
.error-banner {
  background: var(--red-soft); border: 1px solid rgba(248, 113, 113, 0.25);
  border-radius: var(--radius-sm); padding: 10px 14px; margin: 8px 16px;
  font-size: 13px; color: var(--red); font-family: var(--font-mono);
  line-height: 1.4; display: none;
}
.error-banner.visible { display: block; }

/* ── Bottom Sheet ── */
.bottom-sheet-overlay {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.bottom-sheet-overlay.visible { opacity: 1; pointer-events: auto; }
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 91;
  background: var(--card);
  border-radius: 16px 16px 0 0;
  padding: 20px 16px calc(env(safe-area-inset-bottom) + 20px);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 85vh; overflow-y: auto;
}
.bottom-sheet.visible { transform: translateY(0); }
.bottom-sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--line-strong); margin: 0 auto 16px;
}
.bottom-sheet-title {
  font-size: 17px; font-weight: 700; margin-bottom: 4px;
}
.bottom-sheet-subtitle {
  font-size: 13px; color: var(--muted); margin-bottom: 16px;
}

/* ── Stop Checklist ── */
.stop-checklist { list-style: none; margin-bottom: 20px; }
.stop-checklist-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--line);
  font-size: 14px;
}
.stop-checklist-item:last-child { border-bottom: none; }
.stop-check-icon {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  background: var(--page-soft); border: 1px solid var(--line);
  color: var(--muted);
}
.stop-check-icon.pending { color: var(--muted); }
.stop-check-icon.running { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-ink); animation: pulse 1.5s infinite; }
.stop-check-icon.success { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.stop-check-icon.failed { background: var(--red-soft); border-color: var(--red); color: var(--red); }
.stop-step-label { flex: 1; }
.stop-step-error {
  font-size: 12px; color: var(--red); font-family: var(--font-mono);
  margin-top: 4px; line-height: 1.3;
}

/* ── Queue Screen ── */
.queue-section { margin-bottom: 20px; }
.queue-section-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 0 8px; font-size: 13px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
}
.queue-badge {
  font-size: 11px; font-weight: 700; padding: 1px 7px;
  border-radius: 99px; font-family: var(--font-mono);
}
.queue-badge-alert { background: var(--red-soft); color: var(--red); }
.queue-badge-queued { background: var(--yellow-soft); color: var(--yellow); }
.queue-badge-merged { background: var(--green-soft); color: var(--green); }
.queue-badge-rejected { background: var(--red-soft); color: var(--red); }
.queue-card {
  background: var(--card); border-radius: var(--radius);
  padding: 12px 16px; margin-bottom: 8px;
  border: 1px solid var(--line);
}
.queue-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.queue-pr-number {
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  color: var(--accent-ink);
}
.queue-pr-status {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 99px; text-transform: uppercase; letter-spacing: 0.3px;
}
.queue-status-queued { background: var(--yellow-soft); color: var(--yellow); }
.queue-status-merged { background: var(--green-soft); color: var(--green); }
.queue-status-rejected { background: var(--red-soft); color: var(--red); }
.queue-status-alert { background: var(--red-soft); color: var(--red); }
.queue-pr-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.queue-pr-meta {
  display: flex; gap: 12px; margin-top: 6px; font-size: 12px;
  color: var(--muted); font-family: var(--font-mono);
}
.queue-alert-card {
  background: var(--red-soft); border: 1px solid rgba(248, 113, 113, 0.25);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px;
}
.queue-alert-msg { font-size: 13px; color: var(--red); line-height: 1.4; }
.queue-alert-time { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }
.queue-refresh-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; margin-bottom: 8px; font-size: 12px; color: var(--muted);
}
.queue-refresh-btn {
  background: none; border: 1px solid var(--line); color: var(--ink-secondary);
  padding: 4px 12px; border-radius: var(--radius-sm); font-size: 12px;
  cursor: pointer; font-family: var(--font-sans);
}
.queue-refresh-btn:active { background: var(--page-soft); }

/* ── Deploy Screen ── */
.deploy-preview { padding-bottom: 16px; }
.deploy-version-row {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.deploy-version-card {
  flex: 1; background: var(--page-soft); border-radius: var(--radius-sm);
  padding: 12px; border: 1px solid var(--line); text-align: center;
}
.deploy-version-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.deploy-version-value { font-size: 16px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -0.3px; }
.deploy-arrow { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; padding: 0 4px; }
.deploy-warning {
  background: var(--yellow-soft); border: 1px solid rgba(251, 191, 36, 0.25);
  border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px;
  font-size: 13px; color: var(--yellow); display: flex; align-items: center; gap: 8px;
}
.deploy-warning-icon { font-size: 18px; flex-shrink: 0; }
.deploy-commits-card {
  background: var(--card); border-radius: var(--radius); border: 1px solid var(--line);
  margin-bottom: 12px; overflow: hidden;
}
.deploy-commits-header {
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  color: var(--muted); border-bottom: 1px solid var(--line);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.deploy-commit-item {
  padding: 8px 16px; border-bottom: 1px solid var(--line);
  font-size: 13px; font-family: var(--font-mono);
}
.deploy-commit-item:last-child { border-bottom: none; }
.deploy-commit-sha { color: var(--accent-ink); font-weight: 500; }
.deploy-commit-msg { color: var(--ink-secondary); margin-left: 8px; }
.deploy-actions-card {
  background: var(--card); border-radius: var(--radius); border: 1px solid var(--line);
  margin-bottom: 16px; overflow: hidden;
}
.deploy-actions-header {
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  color: var(--muted); border-bottom: 1px solid var(--line);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.deploy-action-item {
  padding: 8px 16px; border-bottom: 1px solid var(--line);
  font-size: 13px; display: flex; align-items: center; gap: 8px;
}
.deploy-action-item:last-child { border-bottom: none; }
.deploy-action-icon { color: var(--accent-ink); }
.deploy-output {
  background: #0d0d10; border-radius: var(--radius);
  border: 1px solid var(--line); padding: 12px;
  font-family: var(--font-mono); font-size: 12px;
  line-height: 1.6; color: var(--ink-secondary);
  max-height: 300px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
  display: none;
}
.deploy-output.visible { display: block; }
.deploy-output .line-success { color: var(--green); }
.deploy-output .line-error { color: var(--red); }
.deploy-output .line-info { color: var(--accent-ink); }
.deploy-status-banner {
  border-radius: var(--radius-sm); padding: 12px 16px; margin-top: 12px;
  font-size: 14px; font-weight: 600; text-align: center; display: none;
}
.deploy-status-banner.visible { display: block; }
.deploy-status-banner.success { background: var(--green-soft); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.25); }
.deploy-status-banner.failure { background: var(--red-soft); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.25); }
.hold-btn.deploy-btn {
  background: var(--accent-soft); border-color: rgba(94, 106, 210, 0.3);
  color: var(--accent-ink);
}
.hold-btn.deploy-btn .hold-fill { background: rgba(94, 106, 210, 0.15); }
.hold-btn:disabled {
  opacity: 0.4; cursor: not-allowed;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }

/* ── Usage Gauges ── */
.usage-gauges {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  padding: 12px 16px;
}
.usage-gauge {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: var(--page-soft); border-radius: var(--radius);
  padding: 14px 8px 10px;
}
.usage-gauge-label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.usage-gauge-ring {
  position: relative; width: 80px; height: 80px;
}
.usage-gauge-ring svg {
  width: 100%; height: 100%; transform: rotate(-90deg);
}
.usage-gauge-ring .track {
  fill: none; stroke: var(--line); stroke-width: 5;
}
.usage-gauge-ring .fill {
  fill: none; stroke: var(--accent); stroke-width: 5;
  stroke-linecap: round; transition: stroke-dashoffset 600ms ease;
}
.usage-gauge-ring .fill.warning { stroke: var(--yellow); }
.usage-gauge-ring .fill.danger { stroke: var(--red); }
.usage-gauge-percent {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; font-family: var(--font-mono);
  letter-spacing: -0.5px;
}
.usage-gauge-detail {
  font-size: 11px; color: var(--muted); text-align: center;
  font-family: var(--font-mono);
}

/* ── Active Account ── */
.active-account {
  padding: 0 16px 12px;
}
.active-account .account-card {
  background: var(--page-soft); border-radius: var(--radius);
  padding: 12px 14px; display: grid; gap: 8px;
}
.account-row {
  display: flex; justify-content: space-between; align-items: center;
}
.account-label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.account-value {
  font-size: 13px; font-weight: 500; font-family: var(--font-mono);
  display: flex; align-items: center; gap: 6px;
}
.account-status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
}
/* ── Switch Account Button ── */
.switch-account-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; margin-top: 8px; padding: 10px 0;
  background: rgba(94, 106, 210, 0.12); border: 1px solid rgba(94, 106, 210, 0.25);
  border-radius: var(--radius-sm); color: #5e6ad2;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.switch-account-btn:active {
  background: rgba(94, 106, 210, 0.22);
}
.switch-account-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
}
.switch-account-btn .switch-icon {
  font-size: 14px;
}

.usage-error-banner {
  background: var(--red-soft); border: 1px solid rgba(248, 113, 113, 0.3);
  border-radius: var(--radius-sm); padding: 8px 12px;
  color: var(--red); font-size: 12px;
  margin: 0 16px 8px; display: none;
}
.usage-error-banner.visible { display: block; }
</style>
</head>
<body>

<!-- App Shell -->
<div id="app">
  <!-- Header -->
  <header class="header">
    <button class="header-back" id="header-back">← Back</button>
    <div class="header-title" id="header-title">Pipeline</div>
    <div class="header-dot" id="connection-dot" title="SSE connection status"></div>
    <button class="header-settings" id="header-settings" title="Change server">⚙</button>
  </header>

  <!-- Error Banner -->
  <div class="error-banner" id="error-banner"></div>

  <!-- Pipeline Screen -->
  <div class="screen active" id="screen-pipeline">
    <div class="status-bar" id="status-bar">
      <div class="status-item running">
        <div class="status-count" id="count-running">–</div>
        <div class="status-label">Running</div>
      </div>
      <div class="status-item retrying">
        <div class="status-count" id="count-retrying">–</div>
        <div class="status-label">Retry</div>
      </div>
      <div class="status-item completed">
        <div class="status-count" id="count-completed">–</div>
        <div class="status-label">Done</div>
      </div>
      <div class="status-item failed">
        <div class="status-count" id="count-failed">–</div>
        <div class="status-label">Failed</div>
      </div>
    </div>
    <div class="totals-bar" id="totals-bar"></div>

    <!-- Usage Gauges -->
    <div class="usage-error-banner" id="usage-error"></div>
    <div class="usage-gauges" id="usage-gauges">
      <div class="usage-gauge" id="usage-gauge-5h">
        <span class="usage-gauge-label">5-hour window</span>
        <div class="usage-gauge-ring">
          <svg viewBox="0 0 36 36">
            <circle class="track" cx="18" cy="18" r="15.9155" />
            <circle class="fill" cx="18" cy="18" r="15.9155"
              stroke-dasharray="100, 100"
              stroke-dashoffset="100"
              id="gauge-5h-fill" />
          </svg>
          <span class="usage-gauge-percent" id="gauge-5h-percent">–</span>
        </div>
        <span class="usage-gauge-detail" id="gauge-5h-detail">Loading…</span>
      </div>
      <div class="usage-gauge" id="usage-gauge-weekly">
        <span class="usage-gauge-label">Weekly window</span>
        <div class="usage-gauge-ring">
          <svg viewBox="0 0 36 36">
            <circle class="track" cx="18" cy="18" r="15.9155" />
            <circle class="fill" cx="18" cy="18" r="15.9155"
              stroke-dasharray="100, 100"
              stroke-dashoffset="100"
              id="gauge-weekly-fill" />
          </svg>
          <span class="usage-gauge-percent" id="gauge-weekly-percent">–</span>
        </div>
        <span class="usage-gauge-detail" id="gauge-weekly-detail">Loading…</span>
      </div>
    </div>

    <!-- Active Account -->
    <div class="active-account" id="active-account">
      <div class="account-card">
        <div class="account-row">
          <span class="account-label">Email</span>
          <span class="account-value" id="account-email"><span class="account-status-dot"></span>Loading…</span>
        </div>
        <div class="account-row">
          <span class="account-label">Organization</span>
          <span class="account-value" id="account-org">Loading…</span>
        </div>
        <button class="switch-account-btn" id="switch-account" type="button">
          <span class="switch-icon">⇄</span> Switch Account
        </button>
      </div>
    </div>

    <div class="screen-content" id="pipeline-content">
      <div class="empty-state">
        <div class="empty-state-icon">📡</div>
        <div class="empty-state-text">Connecting…</div>
      </div>
    </div>
  </div>

  <!-- Issue Detail Screen -->
  <div class="screen" id="screen-detail"></div>

  <!-- Queue Screen -->
  <div class="screen" id="screen-queue">
    <div class="screen-content" id="queue-content">
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <div class="empty-state-text">Loading queue…</div>
      </div>
    </div>
  </div>

  <!-- Deploy Screen -->
  <div class="screen" id="screen-deploy">
    <div class="screen-content" id="pipeline-control-content">
      <div class="empty-state">
        <div class="empty-state-icon">⏸</div>
        <div class="empty-state-text">Loading pipeline status…</div>
      </div>
    </div>
    <div class="screen-content" id="deploy-content">
      <div class="empty-state">
        <div class="empty-state-icon">🚀</div>
        <div class="empty-state-text">Loading deploy preview…</div>
      </div>
    </div>
  </div>

  <!-- Reports Screen -->
  <div class="screen" id="screen-reports">
    <div class="screen-content" id="reports-content">
      <div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <div class="empty-state-text">No reports found</div>
      </div>
    </div>
  </div>

  <!-- Stop Bottom Sheet -->
  <div class="bottom-sheet-overlay" id="stop-sheet-overlay"></div>
  <div class="bottom-sheet" id="stop-sheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title" id="stop-sheet-title">Stop Issue</div>
    <div class="bottom-sheet-subtitle" id="stop-sheet-subtitle"></div>
    <ul class="stop-checklist" id="stop-checklist"></ul>
    <div id="stop-sheet-error" class="error-banner" style="margin:0 0 12px"></div>
    <button class="hold-btn" id="stop-sheet-btn">
      <span class="hold-fill"></span>
      <span class="hold-btn-text">Hold to Confirm Stop</span>
    </button>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-item active" data-tab="pipeline">
      <span class="tab-icon">▶</span>
      Pipeline
    </button>
    <button class="tab-item" data-tab="queue">
      <span class="tab-icon">⏳</span>
      Merge Queue
    </button>
    <button class="tab-item" data-tab="deploy">
      <span class="tab-icon">🚀</span>
      Actions
    </button>
    <button class="tab-item" data-tab="reports">
      <span class="tab-icon">📊</span>
      Reports
    </button>
  </nav>
</div>

<script>
(function() {
  'use strict';

  // ── State ──
  let baseUrl = '';
  let eventSource = null;
  let snapshot = null;
  let currentScreen = 'pipeline';
  let selectedIssueId = null;
  let stopHoldTimer = null;

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  // ── Auto-connect using window.location.hostname + localStorage port ──
  const symphonyPort = localStorage.getItem('symphony_port') || '4321';
  baseUrl = `http://${window.location.hostname}:${symphonyPort}`;

  function connect() {
    startSSE();
    loadReports();
  }

  // Settings button → prompt for port change
  $('#header-settings').addEventListener('click', () => {
    const newPort = prompt('Symphony API port:', localStorage.getItem('symphony_port') || '4321');
    if (newPort && /^\d+$/.test(newPort.trim())) {
      localStorage.setItem('symphony_port', newPort.trim());
      if (eventSource) { eventSource.close(); eventSource = null; }
      $('#connection-dot').classList.remove('connected');
      baseUrl = `http://${window.location.hostname}:${newPort.trim()}`;
      connect();
    }
  });

  // Auto-connect on load
  connect();

  // ── SSE Connection ──
  function startSSE() {
    if (eventSource) eventSource.close();
    const dot = $('#connection-dot');
    dot.classList.remove('connected');

    try {
      eventSource = new EventSource(`${baseUrl}/api/v1/events`);

      eventSource.addEventListener('snapshot', (e) => {
        try {
          snapshot = JSON.parse(e.data);
          dot.classList.add('connected');
          hideError();
          renderPipeline();
          if (currentScreen === 'detail' && selectedIssueId) {
            renderDetail(selectedIssueId);
          }
        } catch (err) {
          showError('Failed to parse snapshot: ' + err.message);
        }
      });

      eventSource.addEventListener('error', (e) => {
        if (e.data) {
          try {
            const err = JSON.parse(e.data);
            showError(err.message || err.code || 'SSE error');
          } catch (_) {
            showError('Connection error');
          }
        }
      });

      eventSource.onerror = () => {
        dot.classList.remove('connected');
      };

      // Also do an initial fetch in case SSE takes a moment
      fetch(`${baseUrl}/api/v1/state`)
        .then(r => r.json())
        .then(data => {
          if (!snapshot) {
            snapshot = data;
            dot.classList.add('connected');
            renderPipeline();
          }
        })
        .catch(() => {});
    } catch (err) {
      showError('Failed to connect: ' + err.message);
    }
  }

  // ── Error Banner ──
  function showError(msg) {
    const el = $('#error-banner');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function hideError() {
    $('#error-banner').classList.remove('visible');
  }

  // ── Navigation ──
  $$('.tab-item').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      navigateTo(target);
    });
  });

  function navigateTo(screen, issueId) {
    // Deactivate all screens
    $$('.screen').forEach(s => s.classList.remove('active'));
    $$('.tab-item').forEach(t => t.classList.remove('active'));

    currentScreen = screen;
    selectedIssueId = issueId || null;

    const titles = { pipeline: 'Pipeline', queue: 'Merge Queue', deploy: 'Actions', reports: 'Reports' };

    if (screen === 'detail') {
      $('#screen-detail').classList.add('active');
      $('#header-back').classList.add('visible');
      $('#header-title').textContent = issueId || 'Issue';
      renderDetail(issueId);
    } else {
      const screenEl = $(`#screen-${screen}`);
      if (screenEl) screenEl.classList.add('active');
      const tabEl = $(`.tab-item[data-tab="${screen}"]`);
      if (tabEl) tabEl.classList.add('active');
      $('#header-back').classList.remove('visible');
      $('#header-title').textContent = titles[screen] || screen;

      // Trigger data loading on tab switch
      if (screen === 'queue') loadQueue();
      if (screen === 'deploy') { loadPipelineStatus(); loadDeployPreview(); }
    }
  }

  $('#header-back').addEventListener('click', () => {
    navigateTo('pipeline');
  });

  // ── Pipeline Rendering ──
  function renderPipeline() {
    if (!snapshot) return;

    // Status counts
    $('#count-running').textContent = snapshot.counts.running;
    $('#count-retrying').textContent = snapshot.counts.retrying;
    $('#count-completed').textContent = snapshot.counts.completed;
    $('#count-failed').textContent = snapshot.counts.failed;

    // Totals bar
    const t = snapshot.codex_totals;
    $('#totals-bar').innerHTML = `
      <span>Tokens: <span class="value">${fmtNum(t.total_tokens)}</span></span>
      <span>In: <span class="value">${fmtNum(t.input_tokens)}</span></span>
      <span>Out: <span class="value">${fmtNum(t.output_tokens)}</span></span>
      <span>Runtime: <span class="value">${fmtDuration(t.seconds_running)}</span></span>
    `;

    // Build content
    let html = '';

    // Running issues
    if (snapshot.running.length > 0) {
      html += `<div class="section-title">Running</div>`;
      for (const issue of snapshot.running) {
        html += renderIssueCard(issue);
      }
    }

    // Retrying issues
    if (snapshot.retrying.length > 0) {
      html += `<div class="section-title">Retrying</div>`;
      for (const retry of snapshot.retrying) {
        html += renderRetryCard(retry);
      }
    }

    // Empty state
    if (snapshot.running.length === 0 && snapshot.retrying.length === 0) {
      html += `
        <div class="empty-state">
          <div class="empty-state-icon">✓</div>
          <div class="empty-state-text">No active pipelines</div>
        </div>`;
    }

    $('#pipeline-content').innerHTML = html;

    // Attach click handlers
    $$('.issue-card').forEach(card => {
      card.addEventListener('click', () => {
        navigateTo('detail', card.dataset.issueIdentifier);
      });
    });
  }

  function renderIssueCard(issue) {
    const stageClass = issue.pipeline_stage ? `stage-${issue.pipeline_stage}` : '';
    const healthClass = `health-${issue.health}`;
    return `
      <div class="issue-card" data-issue-identifier="${esc(issue.issue_identifier)}">
        <div class="issue-card-header">
          <span class="issue-id">${esc(issue.issue_identifier)}</span>
          ${issue.pipeline_stage ? `<span class="issue-stage ${stageClass}">${esc(issue.pipeline_stage)}</span>` : ''}
          <span class="health-dot ${healthClass}" title="${esc(issue.health_reason || issue.health)}"></span>
        </div>
        <div class="issue-title">${esc(issue.issue_title)}</div>
        <div class="issue-meta">
          <span class="issue-meta-item">↻ ${issue.turn_count}</span>
          <span class="issue-meta-item">⏱ ${fmtDuration(issue.stage_duration_seconds)}</span>
          <span class="issue-meta-item">${fmtNum(issue.tokens.total_tokens)} tok</span>
        </div>
      </div>`;
  }

  function renderRetryCard(retry) {
    return `
      <div class="retry-card">
        <div class="retry-header">
          <span class="retry-id">${esc(retry.issue_identifier || retry.issue_id)}</span>
          <span class="retry-attempt">attempt ${retry.attempt}</span>
        </div>
        ${retry.error ? `<div class="retry-error">${esc(retry.error)}</div>` : ''}
        <div class="retry-due">Due: ${esc(retry.due_at)}</div>
      </div>`;
  }

  // ── Issue Detail Rendering ──
  function renderDetail(issueIdentifier) {
    const container = $('#screen-detail');
    if (!snapshot || !issueIdentifier) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-text">Loading…</div></div>`;
      return;
    }

    // Find issue in snapshot
    const issue = snapshot.running.find(r => r.issue_identifier === issueIdentifier);
    if (!issue) {
      // Try fetching from API
      fetchIssueDetail(issueIdentifier);
      return;
    }

    renderDetailFromRunning(container, issue);
  }

  function renderDetailFromRunning(container, issue) {
    const stageClass = issue.pipeline_stage ? `stage-${issue.pipeline_stage}` : '';
    const healthClass = `health-${issue.health}`;
    const linearUrl = `https://linear.app/mobilyze-llc/issue/${encodeURIComponent(issue.issue_identifier)}`;

    // Build stage breakdown bar from execution_history
    const stageBarHtml = buildStageBar(issue);
    const metricsHtml = buildMetrics(issue);
    const activityHtml = buildActivityFeed(issue);

    container.innerHTML = `
      <div class="detail-header">
        <div class="detail-id">${esc(issue.issue_identifier)}</div>
        <div class="detail-title">${esc(issue.issue_title)}</div>
        <div class="detail-badges">
          ${issue.pipeline_stage ? `<span class="detail-badge ${stageClass}">${esc(issue.pipeline_stage)}</span>` : ''}
          <span class="detail-badge" style="background:${issue.health === 'green' ? 'var(--green-soft)' : issue.health === 'yellow' ? 'var(--yellow-soft)' : 'var(--red-soft)'};color:${issue.health === 'green' ? 'var(--green)' : issue.health === 'yellow' ? 'var(--yellow)' : 'var(--red)'}">
            ${esc(issue.health)}${issue.health_reason ? ' — ' + esc(issue.health_reason) : ''}
          </span>
          ${issue.rework_count ? `<span class="detail-badge" style="background:var(--yellow-soft);color:var(--yellow)">rework ×${issue.rework_count}</span>` : ''}
        </div>
      </div>

      ${stageBarHtml}
      ${metricsHtml}

      <div class="section-title" style="padding:0 16px 8px">Activity</div>
      <div class="activity-section">${activityHtml}</div>

      <div class="section-title" style="padding:0 16px 8px">Links</div>
      <div class="deep-links">
        <a class="deep-link" href="${linearUrl}" target="_blank" rel="noopener">
          <span class="deep-link-icon">◆</span>
          Open in Linear
          <span class="deep-link-arrow">→</span>
        </a>
        ${issue.parent_url ? `
        <a class="deep-link" href="${esc(issue.parent_url)}" target="_blank" rel="noopener">
          <span class="deep-link-icon">📋</span>
          Parent Spec
          <span class="deep-link-arrow">→</span>
        </a>` : ''}
        ${issue.last_tool_call ? `
        <div class="deep-link" style="cursor:default">
          <span class="deep-link-icon">🔧</span>
          <span style="font-family:var(--font-mono);font-size:13px">${esc(issue.last_tool_call)}</span>
        </div>` : ''}
      </div>

      ${issue.failure_reason ? `
      <div class="section-title" style="padding:0 16px 8px;color:var(--red)">Last Error</div>
      <div style="padding:0 16px 16px">
        <div class="error-banner visible" style="margin:0">${esc(issue.failure_reason)}</div>
      </div>` : ''}

      <div style="padding:0 16px 24px">
        <button class="hold-btn" id="stop-btn" data-issue="${esc(issue.issue_identifier)}">
          <span class="hold-fill"></span>
          <span class="hold-btn-text">Stop Issue…</span>
        </button>
      </div>
    `;

    // Wire stop button to open bottom sheet
    const stopBtn = $('#stop-btn');
    if (stopBtn) {
      stopBtn.addEventListener('click', () => {
        openStopSheet(issue.issue_identifier, issue.issue_title);
      });
    }
  }

  function buildStageBar(issue) {
    const history = issue.execution_history || [];
    const stages = [...history];
    // Add current stage
    if (issue.pipeline_stage) {
      stages.push({
        stage: issue.pipeline_stage,
        totalTokens: issue.tokens.total_tokens,
        durationSeconds: issue.stage_duration_seconds,
        current: true,
      });
    }

    if (stages.length === 0) return '';

    const totalTokens = stages.reduce((s, st) => s + (st.totalTokens || 0), 0);
    const segments = stages.map(st => {
      const pct = totalTokens > 0 ? Math.max(2, (st.totalTokens || 0) / totalTokens * 100) : 100 / stages.length;
      const stageName = st.stage || 'unknown';
      return `<div class="stage-bar-segment ${stageName} ${st.current ? 'current' : ''}" style="flex:${pct}" title="${stageName}: ${fmtNum(st.totalTokens || 0)} tokens"></div>`;
    }).join('');

    const legend = stages.map(st => {
      const name = st.stage || 'unknown';
      const colorMap = { investigate: '#818cf8', implement: 'var(--green)', review: 'var(--yellow)', merge: 'var(--accent-ink)' };
      const color = colorMap[name] || 'var(--muted)';
      return `<span><span class="legend-dot" style="background:${color}"></span>${name}${st.current ? ' ●' : ''}</span>`;
    }).join('');

    return `
      <div class="stage-bar-container">
        <div class="stage-bar-label">Stage Progress</div>
        <div class="stage-bar">${segments}</div>
        <div class="stage-bar-legend">${legend}</div>
      </div>`;
  }

  function buildMetrics(issue) {
    return `
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-value">${issue.turn_count}</div>
          <div class="metric-label">Turns</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${fmtDuration(issue.stage_duration_seconds)}</div>
          <div class="metric-label">Stage Duration</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${fmtNum(issue.tokens.total_tokens)}</div>
          <div class="metric-label">Stage Tokens</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${fmtNum(issue.total_pipeline_tokens)}</div>
          <div class="metric-label">Pipeline Tokens</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${fmtNum(Math.round(issue.tokens_per_turn))}</div>
          <div class="metric-label">Tokens/Turn</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${fmtNum(issue.tokens.cache_read_tokens)}</div>
          <div class="metric-label">Cache Read</div>
        </div>
      </div>`;
  }

  function buildActivityFeed(issue) {
    const events = issue.recent_activity || [];
    if (events.length === 0) {
      return `<div style="color:var(--muted);font-size:13px;padding:8px 0">No recent activity</div>`;
    }

    return events.slice(-20).reverse().map(evt => {
      const time = evt.timestamp ? fmtTime(evt.timestamp) : '';
      const tool = evt.toolName || '';

  // ── Hold-to-Confirm (2 seconds) ──
  function wireHoldToConfirm(btn, onConfirm) {
    let timer = null;

    function start(e) {
      e.preventDefault();
      btn.classList.add('holding');
      timer = setTimeout(() => {
        btn.classList.remove('holding');
        onConfirm();
      }, 2000);
    }

    function cancel() {
      btn.classList.remove('holding');
      if (timer) { clearTimeout(timer); timer = null; }
    }

    btn.addEventListener('mousedown', start);
    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('mouseup', cancel);
    btn.addEventListener('mouseleave', cancel);
    btn.addEventListener('touchend', cancel);
    btn.addEventListener('touchcancel', cancel);
  }

  async function startDeploy() {
    if (deployInProgress) return;
    // Never deploy without showing the dry-run preview first
    if (!deployPreview) {
      showError('Cannot deploy: preview has not loaded yet');
      return;
    }

    deployInProgress = true;
    const btn = $('#deploy-btn');
    if (btn) btn.disabled = true;

    const outputEl = $('#deploy-output');
    const statusEl = $('#deploy-status');
    outputEl.textContent = '';
    outputEl.classList.add('visible');
    statusEl.classList.remove('visible', 'success', 'failure');

    try {
      const resp = await fetch(`${baseUrl}/api/v1/deploy`, { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const rawLine of lines) {
          const trimmed = rawLine.trim();
          if (!trimmed) continue;
          try {
            const payload = JSON.parse(trimmed);
            if (payload.event === 'deploy_output') {
              const line = document.createElement('div');
              if (payload.level === 'error') line.className = 'line-error';
              else if (payload.level === 'success') line.className = 'line-success';
              else if (payload.level === 'info') line.className = 'line-info';
              line.textContent = payload.text || payload.message || trimmed;
              outputEl.appendChild(line);
              outputEl.scrollTop = outputEl.scrollHeight;
            } else if (payload.event === 'deploy_complete') {
              const success = payload.success !== false && payload.status !== 'failure';
              statusEl.textContent = success ? '✓ Deploy Successful' : '✗ Deploy Failed';
              statusEl.className = `deploy-status-banner visible ${success ? 'success' : 'failure'}`;
              if (payload.message) {
                statusEl.textContent += ` — ${payload.message}`;
              }
            }
          } catch (_) {
            outputEl.textContent += trimmed + '\n';
            outputEl.scrollTop = outputEl.scrollHeight;
          }
        }
      }

      deployInProgress = false;
      const btn2 = $('#deploy-btn');
      if (btn2) btn2.disabled = false;
    } catch (err) {
      statusEl.textContent = `✗ Deploy failed: ${err.message}`;
      statusEl.className = 'deploy-status-banner visible failure';
      deployInProgress = false;
      if (btn) btn.disabled = false;
    }
  }

  // ── Utilities ──
  function esc(str) {
    if (str == null) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  }

  function fmtNum(n) {
    if (n == null) return '0';
    return Number(n).toLocaleString('en-US');
  }

  function fmtDuration(seconds) {
    if (!seconds || seconds < 0) return '0s';
    seconds = Math.round(seconds);
    if (seconds < 60) return `${seconds}s`;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    if (m < 60) return `${m}m ${s}s`;
    const h = Math.floor(m / 60);
    const rm = m % 60;
    return `${h}h ${rm}m`;
  }

  function fmtTime(isoStr) {
    if (!isoStr) return '';
    try {
      const d = new Date(isoStr);
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    } catch { return ''; }
  }

  // ── Usage Gauges & Account Info ──
  function gaugeColorClass(pct) {
    if (pct >= 90) return 'danger';
    if (pct >= 70) return 'warning';
    return '';
  }

  function setGauge(prefix, pct, detail) {
    const fillEl = $(`#gauge-${prefix}-fill`);
    const pctEl = $(`#gauge-${prefix}-percent`);
    const detailEl = $(`#gauge-${prefix}-detail`);
    if (!fillEl || !pctEl || !detailEl) return;

    const clamped = Math.max(0, Math.min(100, pct));
    const offset = 100 - clamped;
    fillEl.setAttribute('stroke-dashoffset', String(offset));

    fillEl.classList.remove('warning', 'danger');
    const colorCls = gaugeColorClass(clamped);
    if (colorCls) fillEl.classList.add(colorCls);

    pctEl.textContent = Math.round(clamped) + '%';
    detailEl.textContent = detail || '';
  }

  function showUsageError(msg) {
    const banner = $('#usage-error');
    if (banner) { banner.textContent = msg; banner.classList.add('visible'); }
  }

  function hideUsageError() {
    const banner = $('#usage-error');
    if (banner) { banner.classList.remove('visible'); }
  }

  function validateUsageResponse(data) {
    if (data == null || typeof data !== 'object') {
      return 'Invalid usage response: expected an object';
    }
    if (data.five_hour == null || typeof data.five_hour !== 'object') {
      return 'Invalid usage response: missing five_hour data';
    }
    if (typeof data.five_hour.percentage !== 'number') {
      return 'Invalid usage response: five_hour.percentage must be a number';
    }
    if (data.weekly == null || typeof data.weekly !== 'object') {
      return 'Invalid usage response: missing weekly data';
    }
    if (typeof data.weekly.percentage !== 'number') {
      return 'Invalid usage response: weekly.percentage must be a number';
    }
    if (data.account == null || typeof data.account !== 'object') {
      return 'Invalid usage response: missing account data';
    }
    if (typeof data.account.email !== 'string') {
      return 'Invalid usage response: account.email must be a string';
    }
    return null;
  }

  function fetchUsage() {
    fetch(`${baseUrl}/api/v1/claude/usage`)
      .then(function (res) {
        if (!res.ok) throw new Error('Usage API returned ' + res.status);
        return res.json();
      })
      .then(function (data) {
        const validationError = validateUsageResponse(data);
        if (validationError) {
          showUsageError(validationError);
          return;
        }

        hideUsageError();

        // Update 5-hour gauge
        const fiveHour = data.five_hour;
        const fiveHourDetail = (fiveHour.used != null && fiveHour.limit != null)
          ? fiveHour.used + ' / ' + fiveHour.limit
          : '5-hour usage';
        setGauge('5h', fiveHour.percentage, fiveHourDetail);

        // Update weekly gauge
        const weekly = data.weekly;
        const weeklyDetail = (weekly.used != null && weekly.limit != null)
          ? weekly.used + ' / ' + weekly.limit
          : 'weekly usage';
        setGauge('weekly', weekly.percentage, weeklyDetail);

        // Update active account info
        const emailEl = $('#account-email');
        const orgEl = $('#account-org');
        if (emailEl) {
          emailEl.innerHTML = '<span class="account-status-dot"></span>' + esc(data.account.email);
        }
        if (orgEl) {
          orgEl.textContent = data.account.organization || '\u2014';
        }
      })
      .catch(function (err) {
        showUsageError('Failed to fetch usage data: ' + err.message);
      });
  }

  // Initial fetch + refresh every 30 seconds (matches server-side cache TTL)
  fetchUsage();
  setInterval(fetchUsage, 30000);

  // ── Switch Account Button ──
  const switchBtn = $('#switch-account');
  if (switchBtn) {
    switchBtn.addEventListener('click', async function () {
      if (switchBtn.disabled) return;
      switchBtn.disabled = true;
      switchBtn.textContent = 'Switching…';
      try {
        // TODO: POST to /api/v1/claude/switch endpoint (SYMPH-241 or related task)
        const resp = await fetch(`${baseUrl}/api/v1/claude/switch`, { method: 'POST' });
        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          throw new Error(body.error || 'Switch failed (HTTP ' + resp.status + ')');
        }
        // Refresh usage data after successful switch
        await fetchUsage();
      } catch (err) {
        showUsageError('Account switch failed: ' + err.message);
      } finally {
        switchBtn.disabled = false;
        switchBtn.innerHTML = '<span class="switch-icon">⇄</span> Switch Account';
      }
    });
  }
})();
</script>
</body>
</html>
