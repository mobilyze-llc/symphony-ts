# DEPRECATED — superseded by `token-report.sh rotate` (SYMPH-131)
#
# This newsyslog config is no longer used. Log rotation for symphony logs
# is now handled by `token-report.sh rotate` / `token-report.mjs rotate`,
# which runs as part of the daily pipeline. The two cannot coexist because
# newsyslog renames/truncates without HWM coordination.
#
# To remove this config if previously installed:
#   sudo rm /usr/local/etc/newsyslog.d/com.symphony.newsyslog.conf
#
# Original config (preserved for reference):
# Install: sudo cp ops/com.symphony.newsyslog.conf /etc/newsyslog.d/
#
# Fields: logfile owner:group mode count size(KB) when flags
# - Rotates at 10MB, keeps 5 archives, compresses old logs (J = bzip2)
# - Wildcard (*) matches any project name under ~/Library/Logs/symphony/

/Users/*/Library/Logs/symphony/*/stdout.log  :  644  5  10240  *  J
/Users/*/Library/Logs/symphony/*/stderr.log  :  644  5  10240  *  J
