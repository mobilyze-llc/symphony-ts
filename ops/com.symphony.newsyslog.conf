# newsyslog config for symphony-ts log rotation
# Install: sudo cp ops/com.symphony.newsyslog.conf /etc/newsyslog.d/
#
# Fields: logfile owner:group mode count size(KB) when flags
# - Rotates at 10MB, keeps 5 archives, compresses old logs (J = bzip2)
# - Wildcard (*) matches any project name under ~/Library/Logs/symphony/

/Users/*/Library/Logs/symphony/*/stdout.log  :  644  5  10240  *  J
/Users/*/Library/Logs/symphony/*/stderr.log  :  644  5  10240  *  J
